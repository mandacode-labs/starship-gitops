apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openebs
  sources:
    # Helm chart for OpenEBS
    - repoURL: https://openebs.github.io/openebs
      chart: openebs
      targetRevision: 4.4.0
      helm:
        valueFiles:
          - $values/infra/storage/openebs/values.yaml
    # Reference for values file
    - repoURL: https://github.com/mandacode-lab/starship-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openebs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
