apiVersion: v1
kind: Namespace
metadata:
  name: disk-tools
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: Pod
metadata:
  name: lvm-setup
  namespace: disk-tools
spec:
  hostPID: true
  nodeSelector:
    kubernetes.io/hostname: talos-rkg-m3n
  containers:
    - name: lvm
      image: alpine
      securityContext:
        privileged: true
      command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache lvm2
          echo "=== 현재 디스크 상태 ==="
          lsblk
          echo ""
          echo "=== PV 생성 ==="
          pvcreate /dev/sda
          echo ""
          echo "=== VG 생성 ==="
          vgcreate openebs-vg /dev/sda
          echo ""
          echo "=== 확인 ==="
          pvs
          vgs
          echo ""
          echo "=== 완료! ==="
          sleep infinity
      volumeMounts:
        - name: dev
          mountPath: /dev
  volumes:
    - name: dev
      hostPath:
        path: /dev
  restartPolicy: Never
