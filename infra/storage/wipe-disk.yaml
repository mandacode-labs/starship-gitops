apiVersion: v1
kind: Namespace
metadata:
  name: disk-tools
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: Pod
metadata:
  name: disk-wipe
  namespace: disk-tools
spec:
  hostPID: true
  nodeSelector:
    kubernetes.io/hostname: talos-rkg-m3n
  containers:
    - name: wipe
      image: alpine
      securityContext:
        privileged: true
      command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache util-linux lvm2
          echo "=== 현재 디스크 상태 ==="
          lsblk
          echo ""
          echo "=== wipefs 실행 ==="
          wipefs -a /dev/sda
          echo ""
          echo "=== dd로 앞부분 초기화 ==="
          dd if=/dev/zero of=/dev/sda bs=1M count=100
          echo ""
          echo "=== 완료! 현재 상태 ==="
          lsblk
          sleep infinity
      volumeMounts:
        - name: dev
          mountPath: /dev
  volumes:
    - name: dev
      hostPath:
        path: /dev
  restartPolicy: Never
