apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-ecr
  namespace: argocd
spec:
  project: aws-ecr
  sources:
    - repoURL: https://github.com/mandacode-labs/starship-gitops.git
      targetRevision: main
      path: infra/aws-ecr

  destination:
    server: https://kubernetes.default.svc
    namespace: ecr-cred
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
