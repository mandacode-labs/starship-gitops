apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aws-ecr-image-pull-credentials
  namespace: ecr-cred
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secret-manager
    kind: ClusterSecretStore
  target:
    name: aws-ecr-image-pull-credentials
    creationPolicy: Owner
    template:
      data:
        region: ap-northeast-2
        accessKey: "{{ .accessKey }}"
        secretAccessKey: "{{ .secretAccessKey }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: starship/ecr/image-pull-credentials
        property: accessKey
    - secretKey: secretAccessKey
      remoteRef:
        key: starship/ecr/image-pull-credentials
        property: secretAccessKey
