apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-user-admin
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secret-manager
    kind: ClusterSecretStore
  target:
    name: app-user-admin
    creationPolicy: Owner
    template:
      data:
        username: admin
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: starship/keycloak/user/admin
        property: password
