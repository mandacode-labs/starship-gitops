apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: keycloak
  sources:
    # Helm chart for CloudNativePG cluster (keycloak database)
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cluster
      targetRevision: 0.5.0
      helm:
        valueFiles:
          - $values/infra/keycloak/db/values.yaml

    # Reference for values file
    - repoURL: https://github.com/mandacode-lab/starship-gitops.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/mandacode-lab/starship-gitops.git
      targetRevision: main
      ref: values
      path: infra/keycloak

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
