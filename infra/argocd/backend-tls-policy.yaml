apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: argocd-backend-tls
  namespace: argocd
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: argocd-server
      sectionName: "443"
  validation:
    caCertificateRefs:
      - name: starship-root-ca
        group: ""
        kind: Secret
    hostname: argocd-server.argocd.svc.cluster.local
