apiVersion: "gateway.networking.k8s.io/v1"
kind: HTTPRoute
metadata:
  name: gitea-route
  namespace: serengeti-gitea
spec:
  hostnames:
    - "git.serengeti.sh"
  parentRefs:
    - name: eg
      namespace: default
      sectionName: "https-serengti"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: gitea-http
          namespace: gitea
          port: 3000
---
apiVersion: "gateway.networking.k8s.io/v1alpha2"
kind: TCPRoute
metadata:
  name: gitea-ssh
  namespace: serengeti-gitea
spec:
  parentRefs:
    - name: gitea-gateway
      namespace: envoy-gateway-system
      sectionName: ssh
  rules:
    - backendRefs:
        - name: gitea-ssh
          port: 22
