apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: cert-manager
  sources:
    - repoURL: oci://quay.io/jetstack/charts/cert-manager
      chart: cert-manager
      targetRevision: v1.19.4
      helm:
        valueFiles:
          - $values/apps/cert-manager/values.yaml

    - repoURL: oci://quay.io/jetstack/charts/trust-manager
      chart: trust-manager
      targetRevision: v0.22.0
      helm:
        valueFiles:
          - $values/apps/cert-manager/trust-manager/values.yaml

    - repoURL: https://github.com/mandacode-labs/starship-gitops.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/mandacode-labs/starship-gitops.git
      targetRevision: main
      path: apps/cert-manager/issuers

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
