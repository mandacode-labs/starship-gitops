apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: starship-root-ca
spec:
  sources:
    - secret:
        name: starship-root-ca # cert-manager
        key: ca.crt
  target:
    configMap:
      key: ca.crt
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: default
