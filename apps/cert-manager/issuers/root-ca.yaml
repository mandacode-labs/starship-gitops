apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: starship-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: starship-root-ca
  secretName: starship-root-ca
  duration: 87600h  # 10 years
  renewBefore: 720h  # 30 days
  subject:
    organizations:
      - mandacode
    organizationalUnits:
      - starship
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
