apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: traditional-saju
  namespace: argocd
spec:
  description: Traditional Saju Application Project
  destinations:
    - name: in-cluster
      namespace: traditional-saju
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  sourceRepos:
    - https://github.com/mandacode-labs/starship-gitops.git
    - https://github.com/mandacode-labs/traditional-saju-backend.git
