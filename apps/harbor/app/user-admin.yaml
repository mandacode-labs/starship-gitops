apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-user-admin
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical-mandacode-prod
    kind: ClusterSecretStore
  target:
    name: harbor-user-admin
    creationPolicy: Owner
    template:
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: /harbor/users/admin/username
    - secretKey: password
      remoteRef:
        key: /harbor/users/admin/password
