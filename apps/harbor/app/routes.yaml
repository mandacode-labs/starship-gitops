apiVersion: "gateway.networking.k8s.io/v1"
kind: HTTPRoute
metadata:
  name: harbor-route
  namespace: harbor
spec:
  hostnames:
    - "registry.mandacode.com"
  parentRefs:
    - name: eg
      namespace: default
      sectionName: "https"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: harbor
          namespace: harbor
          port: 80
