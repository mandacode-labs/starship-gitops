apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aws-user-starship-harbor
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secret-manager
    kind: ClusterSecretStore
  target:
    name: harbor-user-admin
    creationPolicy: Owner
    template:
      data:
        REGISTRY_STORAGE_S3_ACCESSKEY: "{{ .access_key }}"
        REGISTRY_STORAGE_S3_SECRETKEY: "{{ .secret_access_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: aws/user/starship-harbor/access-key
        property: access_key
    - secretKey: secret_access_key
      remoteRef:
        key: aws/user/starship-harbor/secret-access-key
        property: secret_access_key
