apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-credentials
  namespace: gitea
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical-mandacode-prod
    kind: ClusterSecretStore
  target:
    name: renovate-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: /gitea/token/renovate-bot
