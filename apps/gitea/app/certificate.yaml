apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gitea-tls
  namespace: gitea
spec:
  commonName: gitea-http.gitea.svc.cluster.local
  dnsNames:
    - gitea-http.gitea.svc.cluster.local
    - gitea-http.gitea.svc
    - gitea-http
  secretName: gitea-tls
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: starship-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
