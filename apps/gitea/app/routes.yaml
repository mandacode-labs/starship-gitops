apiVersion: "gateway.networking.k8s.io/v1"
kind: HTTPRoute
metadata:
  name: gitea-route
  namespace: gitea
spec:
  hostnames:
    - "git.mandacode.com"
  parentRefs:
    - name: eg
      namespace: default
      sectionName: "https"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: gitea-http
          namespace: gitea
          port: 3000
---
apiVersion: "gateway.networking.k8s.io/v1alpha2"
kind: TCPRoute
metadata:
  name: gitea-ssh
  namespace: gitea
spec:
  parentRefs:
    - name: eg
      namespace: default
      sectionName: ssh
  rules:
    - backendRefs:
        - name: gitea-ssh
          port: 22
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: gitea-backend-tls
  namespace: gitea
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: gitea-http
      sectionName: "3000"
  validation:
    caCertificateRefs:
      - name: starship-root-ca
        group: ""
        kind: ConfigMap
    hostname: gitea-http.gitea.svc.cluster.local
