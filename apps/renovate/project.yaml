apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: renovate
  namespace: argocd
spec:
  description: Renovate Bot
  destinations:
    - name: in-cluster
      namespace: renovate
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  sourceRepos:
    - oci://ghcr.io/renovatebot/helm-charts/renovate
    - https://github.com/mandacode-labs/starship-gitops.git
