apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: renovate-credentials
  namespace: renovate
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secret-manager
    kind: ClusterSecretStore
  target:
    name: renovate-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: starship/gitea/user/renovate-bot
        property: token
