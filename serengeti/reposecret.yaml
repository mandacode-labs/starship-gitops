apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: serengeti-starship-gitops-repo
  namespace: argocd
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: infisical-mandacode-prod
    kind: ClusterSecretStore
  target:
    name: serengeti-starship-gitops-repo
    creationPolicy: Owner
    template:
      data:
        type: git
        url: https://git.mandacode.com/serengeti/starship-gitops.git
        name: serengeti/starship-gitops
        username: argocd-gitops
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /gitea/token/argocd-gitops
