apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: serengeti-sync
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://git.mandacode.com/serengeti/starship-gitops.git
        revision: main
        directories:
          - path: apps/*

  template:
    metadata:
      name: "{{path.basename}}-sync"
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: default
      source:
        repoURL: https://git.mandacode.com/serengeti/starship-gitops.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
